<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect — Cancer MDT Coordination Concept</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #F4F6F9;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const BLUE = "#0596DE";
const DARK = "#073B5A";
const GREEN = "#1B9E5A";
const ORANGE = "#E67E22";
const PURPLE = "#7C3AED";
const TEAL = "#0D9488";
const RED = "#DC2626";
const ROSE = "#E11D48";

// Unsplash photos — free license, face-cropped professional headshots
const photos = {
  gp:       "https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?w=150&h=150&fit=crop&crop=face&q=80",
  onco:     "https://images.unsplash.com/photo-1559839734-2b71ea197ec2?w=150&h=150&fit=crop&crop=face&q=80",
  surgeon:  "https://images.unsplash.com/photo-1622253692010-333f2da6031d?w=150&h=150&fit=crop&crop=face&q=80",
  radio:    "https://images.unsplash.com/photo-1537368910025-700350fe46c7?w=150&h=150&fit=crop&crop=face&q=80",
  nurse:    "https://images.unsplash.com/photo-1582750433449-648ed127bb54?w=150&h=150&fit=crop&crop=face&q=80",
  patient:  "https://images.unsplash.com/photo-1580489944761-15a19d654956?w=150&h=150&fit=crop&crop=face&q=80",
};

const practitioners = {
  gp:      { name: "Dr. Moreau",    role: "General Practitioner",       color: BLUE,   bg: "#E8F4FD" },
  onco:    { name: "Dr. Nguyen",    role: "Medical Oncologist",         color: ROSE,   bg: "#FFF1F2" },
  surgeon: { name: "Dr. Lefèvre",   role: "Breast Surgeon",             color: ORANGE, bg: "#FFF3E0" },
  radio:   { name: "Dr. Patel",     role: "Radiation Oncologist",       color: PURPLE, bg: "#F3EEFF" },
  nurse:   { name: "L. Martin",     role: "Oncology Nurse Specialist",  color: TEAL,   bg: "#ECFDF5" },
};

const steps = [
  { label: "Diagnosis",  short: "1" },
  { label: "Referrals",  short: "2" },
  { label: "Treatment",  short: "3" },
  { label: "Incidents",  short: "4" },
  { label: "MDT Review", short: "5" },
];

const carePlanSteps = [
  { label: "Care Plan v1",   updated: "Created by Dr. Moreau",   items: "Initial diagnosis · Referrals pending" },
  { label: "Care Plan v1",   updated: "4 specialists assigned",  items: "Surgery · Systemic therapy · Radiation · Supportive care" },
  { label: "Care Plan v2",   updated: "Post-surgery update",     items: "Adjuvant chemo (TC ×4) · Radiation planned · Endocrine therapy" },
  { label: "Care Plan v2.1", updated: "Toxicity managed",        items: "G-CSF added · Dose maintained · Monitoring continues" },
  { label: "Care Plan v3",   updated: "MDT review",              items: "Chemo complete · RT complete · Endocrine started · Surveillance plan" },
];

const cardSteps = [
  { status: "New",       sc: BLUE,   sb: "#E8F4FD", stage: "IIA",  ecog: "0",   treat: "—",          team: ["gp"],                              cp: "new" },
  { status: "Active",    sc: GREEN,  sb: "#E8F8F0", stage: "IIA",  ecog: "0",   treat: "—",          team: ["gp","onco","surgeon","radio","nurse"], cp: "updated" },
  { status: "Active",    sc: GREEN,  sb: "#E8F8F0", stage: "IIA",  ecog: "1",   treat: "TC Cycle 2/4", team: ["gp","onco","surgeon","radio","nurse"], cp: "updated" },
  { status: "Active",    sc: GREEN,  sb: "#E8F8F0", stage: "IIA",  ecog: "1",   treat: "TC Cycle 2/4", team: ["gp","onco","surgeon","radio","nurse"], cp: "updated", toxWarn: true },
  { status: "Active",    sc: GREEN,  sb: "#E8F8F0", stage: "IIA",  ecog: "0",   treat: "Endocrine",  team: ["gp","onco","surgeon","radio","nurse"], cp: "reviewed" },
];

// ─── Components ───

function PhotoAvatar({ who, size = 36, borderColor }) {
  const bc = borderColor || practitioners[who]?.color || BLUE;
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%", overflow: "hidden",
      flexShrink: 0, border: `2px solid ${bc}`,
    }}>
      <img src={photos[who]} alt="" style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
    </div>
  );
}

function SmallPhoto({ who, active }) {
  if (!active) return null;
  const p = practitioners[who];
  return (
    <div style={{
      width: 28, height: 28, borderRadius: "50%", overflow: "hidden",
      border: `2px solid ${p.color}`,
      marginRight: -6, flexShrink: 0,
      animation: "fadeIn 0.4s ease",
    }}>
      <img src={photos[who]} alt="" style={{
        width: "100%", height: "100%", objectFit: "cover", display: "block",
      }} />
    </div>
  );
}

function RoleBadge({ who }) {
  const p = practitioners[who];
  return (
    <span style={{
      display: "inline-block", padding: "2px 8px", borderRadius: 4,
      fontSize: 9, fontWeight: 600, background: p.bg, color: p.color,
      textTransform: "uppercase", letterSpacing: 0.4,
    }}>{p.role}</span>
  );
}

function Message({ who, text, time, delay = 0 }) {
  const [visible, setVisible] = useState(false);
  const p = practitioners[who];

  useEffect(() => {
    const t = setTimeout(() => setVisible(true), delay);
    return () => clearTimeout(t);
  }, [delay]);

  return (
    <div style={{
      display: "flex", gap: 10, padding: "10px 0",
      opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(10px)",
      transition: "all 0.4s ease",
    }}>
      <PhotoAvatar who={who} size={36} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 2, flexWrap: "wrap" }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: "#2D3340" }}>{p.name}</span>
          <RoleBadge who={who} />
          <span style={{ fontSize: 10, color: "#9BA3B0", marginLeft: "auto" }}>{time}</span>
        </div>
        <div style={{ fontSize: 13, color: "#3D4551", lineHeight: 1.55, marginTop: 4 }}>
          {text}
        </div>
      </div>
    </div>
  );
}

function Divider({ text, delay = 0 }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setVisible(true), delay);
    return () => clearTimeout(t);
  }, [delay]);
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 12, padding: "10px 0",
      opacity: visible ? 1 : 0, transition: "opacity 0.3s ease",
    }}>
      <div style={{ flex: 1, height: 1, background: "#E2E6EC" }} />
      <span style={{ fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.6, color: "#9BA3B0", whiteSpace: "nowrap" }}>{text}</span>
      <div style={{ flex: 1, height: 1, background: "#E2E6EC" }} />
    </div>
  );
}

function Tag({ text, bg, color }) {
  return (
    <span style={{
      display: "inline-block", marginTop: 4, marginRight: 4,
      background: bg, color, padding: "2px 8px",
      borderRadius: 4, fontWeight: 600, fontSize: 11,
    }}>{text}</span>
  );
}

// ─── Patient Card ───

function PatientCard({ step }) {
  const c = cardSteps[step];

  return (
    <div style={{ padding: "14px 20px", background: "#F8F9FB", borderBottom: "1px solid #E2E6EC" }}>
      <div style={{ background: "white", border: "1px solid #E2E6EC", borderRadius: 12, padding: "14px 16px" }}>
        {/* Header */}
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
          <PhotoAvatar who="patient" size={40} borderColor={ROSE} />
          <div>
            <div style={{ fontSize: 14, fontWeight: 600, color: "#2D3340" }}>Claire Dubois</div>
            <div style={{ fontSize: 11, color: "#737D8C", marginTop: 1 }}>52 yrs · Breast Cancer — Invasive Ductal Carcinoma</div>
          </div>
          <span style={{
            marginLeft: "auto", display: "inline-block", padding: "2px 10px", borderRadius: 20,
            fontSize: 10, fontWeight: 600, background: c.sb, color: c.sc,
          }}>{c.status}</span>
        </div>

        {/* Metrics */}
        <div style={{ display: "flex", gap: 6 }}>
          {[
            { label: "Stage", value: c.stage, warn: false },
            { label: "ECOG", value: c.ecog, warn: false },
            { label: "Treatment", value: c.treat, warn: !!c.toxWarn },
          ].map(m => (
            <div key={m.label} style={{ flex: 1, background: m.warn ? "#FEF2F2" : "#F8F9FB", borderRadius: 8, padding: "7px 8px", textAlign: "center", transition: "background 0.4s" }}>
              <div style={{ fontSize: 9, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5, color: "#9BA3B0", marginBottom: 2 }}>{m.label}</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: m.warn ? RED : "#2D3340", transition: "color 0.4s" }}>{m.value}</div>
            </div>
          ))}
        </div>

        {/* Biomarker row */}
        <div style={{ display: "flex", gap: 4, marginTop: 8 }}>
          {["ER+", "PR+", "HER2−", "Ki-67 22%"].map(marker => (
            <span key={marker} style={{
              display: "inline-block", padding: "2px 7px", borderRadius: 4,
              fontSize: 10, fontWeight: 600, background: "#F3F4F6", color: "#6B7280",
            }}>{marker}</span>
          ))}
          <span style={{
            display: "inline-block", padding: "2px 7px", borderRadius: 4,
            fontSize: 10, fontWeight: 600, background: "#FFF3E0", color: ORANGE,
          }}>T2N0M0</span>
        </div>

        {/* Team + Care Plan row */}
        <div style={{ display: "flex", alignItems: "center", gap: 2, marginTop: 10, paddingTop: 10, borderTop: "1px solid #F1F3F6" }}>
          {["gp","onco","surgeon","radio","nurse"].map(who => (
            <SmallPhoto key={who} who={who} active={c.team.includes(who)} />
          ))}
          <span style={{ fontSize: 10, color: "#9BA3B0", marginLeft: 14 }}>
            {c.team.length} {c.team.length === 1 ? "member" : "members"}
          </span>
          <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 5 }}>
            <span style={{ fontSize: 10, color: "#9BA3B0" }}>📋 Care Plan</span>
            <span style={{
              display: "inline-block", width: 8, height: 8, borderRadius: "50%",
              background: c.cp === "new" ? BLUE : c.cp === "updated" ? GREEN : c.cp === "reviewed" ? ORANGE : "#9BA3B0",
            }} />
            <span style={{
              fontSize: 9, fontWeight: 600,
              color: c.cp === "new" ? BLUE : c.cp === "updated" ? GREEN : c.cp === "reviewed" ? ORANGE : "#9BA3B0",
            }}>{c.cp === "new" ? "New" : c.cp === "updated" ? "Updated" : c.cp === "reviewed" ? "Reviewed" : "Active"}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Step Content ───

function ConsultationBanner({ delay = 0 }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => { const t = setTimeout(() => setVisible(true), delay); return () => clearTimeout(t); }, [delay]);
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 10, padding: "10px 14px",
      background: "#FFF1F2", borderRadius: 10, margin: "6px 0",
      opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(8px)",
      transition: "all 0.4s ease",
    }}>
      <div style={{ display: "flex", alignItems: "center" }}>
        <PhotoAvatar who="gp" size={28} style={{ border: "2px solid white", zIndex: 2 }} />
        <PhotoAvatar who="patient" size={28} style={{ marginLeft: -8, border: "2px solid white", zIndex: 1 }} />
      </div>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: DARK }}>Consultation · 40 min</div>
        <div style={{ fontSize: 11, color: "#6B7280" }}>Dr. Moreau with Claire Dubois</div>
      </div>
      <div style={{
        display: "flex", alignItems: "center", gap: 4,
        padding: "4px 8px", borderRadius: 6, background: "#E8F8F0",
      }}>
        <span style={{ fontSize: 14 }}>🩺</span>
        <span style={{ fontSize: 11, fontWeight: 600, color: GREEN }}>Completed</span>
      </div>
    </div>
  );
}

function Step1() {
  return (
    <>
      <ConsultationBanner delay={100} />
      <Message who="gp" time="9:15 AM" delay={500}
        text={<>Following Claire's consultation — core needle biopsy confirms invasive ductal carcinoma, grade 2. Receptor status: ER+/PR+/HER2−, Ki-67 at 22%. Staging CT and bone scan show no distant metastases. TNM staging: T2N0M0, Stage IIA. She needs an urgent MDT referral for treatment planning.<br/><Tag text="Care plan created" bg="#E8F4FD" color={BLUE} /> <Tag text="Breast cancer pathway" bg="#FFF1F2" color={ROSE} /></>}
      />
    </>
  );
}

function Step2() {
  return (
    <>
      <Message who="gp" time="9:15 AM" delay={200}
        text={<>Team — I'm referring Claire Dubois for multidisciplinary breast cancer management. Biopsy, imaging and full history are in her file. Stage IIA IDC, hormone receptor positive, HER2 negative. She's anxious but well-informed — please coordinate timing so she isn't overwhelmed by appointments.<br/><Tag text="4 referrals sent" bg="#E8F4FD" color={BLUE} /></>}
      />
      <Message who="surgeon" time="10:05 AM" delay={500}
        text="Referral received. Based on the 2.8 cm tumour with clear axillary imaging, I'm planning a wide local excision with sentinel lymph node biopsy. Booking her for next Thursday — we'll confirm margins and nodal status with frozen section."
      />
      <Message who="onco" time="11:30 AM" delay={800}
        text="Thanks Dr. Moreau. I'll see Claire post-surgery to plan adjuvant systemic therapy. Given ER+/HER2− and Ki-67 of 22%, we'll likely need an Oncotype DX assay to guide the chemotherapy decision. Will hold off on final recommendations until we have surgical pathology."
      />
      <Message who="radio" time="1:12 PM" delay={1100}
        text="Noted. After breast-conserving surgery she'll need whole-breast radiotherapy — typically 40 Gy in 15 fractions over 3 weeks. I'll schedule the CT planning scan for 4–6 weeks post-op, once the surgical wound has settled."
      />
      <Message who="nurse" time="2:40 PM" delay={1400}
        text="I've spoken with Claire and her partner today. Set her up with our breast cancer support pack, pre-operative education, and a direct line to the CNS team. She's understandably worried about her children — I've flagged a family support referral."
      />
    </>
  );
}

function Step3() {
  return (
    <>
      <Divider text="3 weeks post-surgery — Pathology results" delay={100} />
      <Message who="surgeon" time="Tue 9:20 AM" delay={300}
        text={<>Surgery went well. Wide local excision with sentinel lymph node biopsy complete. Pathology confirms: clear margins (closest 4 mm), 0 of 3 sentinel nodes positive. Final staging unchanged — pT2 pN0. Claire tolerated the procedure well, wound healing nicely.<br/><Tag text="Margins clear" bg="#E8F8F0" color={GREEN} /> <Tag text="Nodes 0/3" bg="#E8F8F0" color={GREEN} /></>}
      />
      <Message who="onco" time="Wed 2:15 PM" delay={700}
        text={<>Oncotype DX result is back: recurrence score 22 (intermediate range). Based on the TAILORx and RxPONDER data, the absolute chemotherapy benefit at this score is modest but meaningful for a 52-year-old. I'm recommending 4 cycles of TC (docetaxel + cyclophosphamide) q21d, followed by 5–10 years of aromatase inhibitor therapy. Discussed risks and benefits with Claire — she wants to proceed.<br/><Tag text="Oncotype RS: 22" bg="#FFF3E0" color={ORANGE} /> <Tag text="TC ×4 planned" bg="#FFF1F2" color={ROSE} /></>}
      />
      <Message who="nurse" time="Thu 10:00 AM" delay={1100}
        text="Pre-chemo education session complete. Claire understands the side-effect profile — neutropenia risk, fatigue, alopecia. She's been fitted for a cold cap. I've arranged her PICC line insertion for Monday and set up weekly bloods for cycle monitoring."
      />
    </>
  );
}

function Step4() {
  return (
    <>
      <Divider text="Cycle 2, Day 10 — Toxicity flag" delay={100} />
      <Message who="nurse" time="Mon 8:30 AM" delay={300}
        text={<>Alert — Claire's Day 8 bloods show neutrophils at 0.8 × 10⁹/L (grade 3 febrile neutropenia threshold). She's afebrile but reporting significant fatigue and mild oral mucositis. I've advised her to monitor temperature every 4 hours and come in immediately if she spikes above 38°C.<br/><Tag text="⚠ Neutrophils 0.8 × 10⁹/L" bg="#FEF2F2" color={RED} /> <Tag text="Grade 2 fatigue" bg="#FEF2F2" color={RED} /></>}
      />
      <Message who="onco" time="Mon 9:45 AM" delay={700}
        text={<>Thanks for the early flag. Let's add prophylactic G-CSF (pegfilgrastim) starting 24 hours post-chemo for remaining cycles. I want to maintain dose intensity — no dose reduction yet. If she becomes febrile, admit for IV antibiotics per our neutropenic sepsis protocol. <span style={{ color: TEAL, fontWeight: 600, cursor: "pointer" }}>@L. Martin</span> — can you arrange the G-CSF prescription and check her renal function before cycle 3?</>}
      />
      <Message who="nurse" time="Mon 10:15 AM" delay={1100}
        text="On it. I'll add pegfilgrastim to her day-2 injection schedule and recheck bloods on Thursday. Also prescribing chlorhexidine mouthwash for the mucositis and referring to our dietitian for nutritional support during treatment. Claire's coping well psychologically — her partner has been brilliant."
      />
      <Message who="gp" time="Mon 11:30 AM" delay={1400}
        text="Thanks for keeping me in the loop. I've flagged her record for urgent same-day access if she calls the surgery with any fever or infection symptoms. Will also check in with her at our Thursday appointment."
      />
    </>
  );
}

function CheckItem({ text, checked = false, delay = 0 }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => { const t = setTimeout(() => setVisible(true), delay); return () => clearTimeout(t); }, [delay]);
  return (
    <div style={{
      display: "flex", alignItems: "flex-start", gap: 8, padding: "5px 0",
      opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(6px)",
      transition: "all 0.3s ease",
    }}>
      <div style={{
        width: 16, height: 16, borderRadius: 4, flexShrink: 0, marginTop: 1,
        border: checked ? "none" : `1.5px solid ${BLUE}`,
        background: checked ? BLUE : "white",
        display: "flex", alignItems: "center", justifyContent: "center",
      }}>
        {checked && <span style={{ color: "white", fontSize: 10, fontWeight: 700 }}>✓</span>}
      </div>
      <span style={{ fontSize: 12, color: "#3D4551", lineHeight: 1.4 }}>{text}</span>
    </div>
  );
}

function VideoCallBanner({ delay = 0 }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => { const t = setTimeout(() => setVisible(true), delay); return () => clearTimeout(t); }, [delay]);
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 10, padding: "10px 14px",
      background: "#F0F4FF", borderRadius: 10, margin: "6px 0",
      opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(8px)",
      transition: "all 0.4s ease",
    }}>
      <div style={{ display: "flex", alignItems: "center" }}>
        {["onco","surgeon","radio","nurse"].map((who, i) => (
          <PhotoAvatar key={who} who={who} size={28} style={{
            marginLeft: i > 0 ? -8 : 0, border: "2px solid white", position: "relative", zIndex: 4 - i,
          }} />
        ))}
      </div>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: DARK }}>MDT Meeting · 45 min</div>
        <div style={{ fontSize: 11, color: "#6B7280" }}>Breast Cancer MDT — Case #2024-0847</div>
      </div>
      <div style={{
        display: "flex", alignItems: "center", gap: 4,
        padding: "4px 8px", borderRadius: 6, background: "#E8F8F0",
      }}>
        <span style={{ fontSize: 14 }}>📹</span>
        <span style={{ fontSize: 11, fontWeight: 600, color: GREEN }}>Completed</span>
      </div>
    </div>
  );
}

function Step5() {
  return (
    <>
      <Divider text="Post-treatment MDT review" delay={100} />
      <VideoCallBanner delay={300} />
      <Message who="onco" time="Today 2:15 PM" delay={700}
        text="Good discussion today. Claire completed all 4 TC cycles with G-CSF support — no further neutropenic episodes. Post-chemo imaging shows no residual disease. Here are the agreed outcomes:"
      />
      <div style={{
        marginTop: 8, padding: "12px 14px", background: "#F8F9FB",
        borderRadius: 10, border: `1px solid #E2E6EC`,
      }}>
        <div style={{ marginBottom: 8 }}>
          <span style={{ fontSize: 12, fontWeight: 700, color: DARK }}>MDT Outcomes & Next Steps</span>
        </div>
        <CheckItem text="Whole-breast RT completed — 40 Gy / 15 fractions, well tolerated" delay={900} />
        <CheckItem text="Start letrozole 2.5 mg daily (aromatase inhibitor) — planned for 5 years minimum" delay={1100} />
        <CheckItem text="Baseline DEXA scan before AI therapy — monitor bone density annually" delay={1300} />
        <CheckItem text="Mammogram + clinical exam every 6 months for first 2 years" delay={1500} />
        <CheckItem text="Psychological wellbeing review — Claire reports anxiety about recurrence, refer to survivorship programme" delay={1700} />
        <CheckItem text="Next MDT review in 6 months, or earlier if surveillance imaging flags any concern" delay={1900} />
      </div>
    </>
  );
}

const stepComponents = [Step1, Step2, Step3, Step4, Step5];

// ─── Main App ───

function App() {
  const [currentStep, setCurrentStep] = useState(0);
  const [animKey, setAnimKey] = useState(0);

  function goTo(i) {
    setCurrentStep(i);
    setAnimKey(k => k + 1);
  }

  const StepContent = stepComponents[currentStep];

  return (
    <div style={{
      width: 520, height: 820, background: "white", borderRadius: 16,
      boxShadow: "0 16px 48px rgba(7,59,90,0.12), 0 0 0 1px rgba(0,0,0,0.04)",
      display: "flex", flexDirection: "column", overflow: "hidden",
    }}>
      {/* Title bar */}
      <div style={{
        height: 48, background: DARK, display: "flex", alignItems: "center",
        padding: "0 20px", gap: 10, flexShrink: 0,
      }}>
        <span style={{ fontSize: 17, fontWeight: 700, color: "white", letterSpacing: -0.3 }}>Connect</span>
        <div style={{ flex: 1 }} />
        <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
          <div style={{ width: 6, height: 6, borderRadius: "50%", background: GREEN }} />
          <span style={{ fontSize: 11, color: "rgba(255,255,255,0.5)" }}>
            {cardSteps[currentStep].team.length} online
          </span>
        </div>
      </div>

      {/* Patient card */}
      <PatientCard step={currentStep} />

      {/* Chat area */}
      <div key={animKey} style={{
        flex: 1, overflowY: "auto", padding: "8px 20px",
        display: "flex", flexDirection: "column",
      }}>
        <StepContent />
      </div>

      {/* Step navigation */}
      <div style={{ borderTop: "1px solid #E2E6EC", padding: "12px 16px 14px", background: "white", flexShrink: 0 }}>
        {/* Progress bar */}
        <div style={{ display: "flex", gap: 4, marginBottom: 12 }}>
          {steps.map((_, i) => (
            <div key={i} style={{
              flex: 1, height: 3, borderRadius: 2,
              background: i <= currentStep ? ROSE : "#E2E6EC",
              transition: "background 0.3s",
            }} />
          ))}
        </div>

        {/* Step buttons */}
        <div style={{ display: "flex", gap: 6 }}>
          {steps.map((s, i) => (
            <button key={i} onClick={() => goTo(i)} style={{
              flex: 1, padding: "8px 4px", borderRadius: 8,
              border: i === currentStep ? `2px solid ${ROSE}` : "2px solid transparent",
              background: i === currentStep ? "#FFF1F2" : "#F8F9FB",
              cursor: "pointer", transition: "all 0.2s", fontFamily: "inherit",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
            }}>
              <span style={{ fontSize: 11, fontWeight: 700, color: i === currentStep ? ROSE : "#9BA3B0" }}>{s.short}</span>
              <span style={{ fontSize: 9, fontWeight: 500, color: i === currentStep ? ROSE : "#9BA3B0" }}>{s.label}</span>
            </button>
          ))}
        </div>

        {/* Nav arrows */}
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10 }}>
          <button onClick={() => currentStep > 0 && goTo(currentStep - 1)} style={{
            padding: "6px 16px", borderRadius: 6, border: "1px solid #E2E6EC",
            background: "white", fontSize: 12, fontWeight: 500, color: "#3D4551",
            cursor: currentStep > 0 ? "pointer" : "default",
            opacity: currentStep > 0 ? 1 : 0.3, fontFamily: "inherit",
          }}>← Previous</button>
          <button onClick={() => currentStep < 4 && goTo(currentStep + 1)} style={{
            padding: "6px 16px", borderRadius: 6, border: "none",
            background: currentStep < 4 ? ROSE : "#9BA3B0",
            fontSize: 12, fontWeight: 600, color: "white",
            cursor: currentStep < 4 ? "pointer" : "default", fontFamily: "inherit",
          }}>{currentStep < 4 ? "Next →" : "Done ✓"}</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
